name: CI

on:
  push:
  pull_request:

jobs:
  shell-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck python3-yaml arch-install-scripts

      - name: Validate shell syntax
        run: bash -n scripts/*.sh src/main.sh src/lib/*.sh src/lib/core/*.sh src/lib/modules/*.sh tests/*.sh

      - name: Run ShellCheck
        run: shellcheck -x scripts/*.sh src/main.sh src/lib/*.sh src/lib/core/*.sh src/lib/modules/*.sh tests/*.sh

      - name: Package builder
        run: |
          cp build.conf.example build.conf
          ./scripts/package.sh

      - name: Validate packaged builder
        run: |
          test -x dist/bin/rpi5-archlinux-image
          test -d dist/images
          bash -n dist/bin/rpi5-archlinux-image
          shellcheck -x dist/bin/rpi5-archlinux-image

      - name: Validate workflow YAML
        run: |
          python3 - <<'PY'
          import pathlib
          import yaml

          for path in pathlib.Path(".github/workflows").glob("*.yml"):
              with path.open("r", encoding="utf-8") as fh:
                  yaml.safe_load(fh)
          PY

      - name: Run smoke tests
        run: |
          bash tests/structure_smoke.sh
          bash tests/workflows_smoke.sh
          bash tests/disk_partition_refresh_test.sh
          bash tests/disk_shrink_test.sh
          bash tests/fstab_swap_cleanup_test.sh
          bash tests/disk_cleanup_test.sh
          bash tests/steps_registry_test.sh
          bash tests/boot_validation_test.sh
          bash tests/config_validation_test.sh
          bash tests/cli_test.sh
          ./dist/bin/rpi5-archlinux-image validate

  build-arm:
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/homectl_feature' || github.ref == 'refs/heads/btrbk-luks-fstrim'
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            arch-install-scripts \
            aria2 \
            cryptsetup-bin \
            dosfstools \
            e2fsprogs \
            pacman-package-manager \
            parted \
            psmisc \
            systemd \
            udev \
            util-linux \
            mtools

      - name: Package builder
        run: |
          cp build.conf.example build.conf
          echo 'BUILD_MKINITCPIO_COMPRESSION="cat"' >> build.conf
          if [[ "${{ github.ref }}" == "refs/heads/btrbk-luks-fstrim" ]]; then
            echo 'BUILD_ENABLE_ENCRYPTION=1' >> build.conf
            echo 'BUILD_LUKS_PASSWORD="ci-test"' >> build.conf
            echo "BUILD_AUR_PKG_URL=${{ github.server_url }}/${{ github.repository }}/raw/${{ github.ref_name }}/aur/mkinitcpio-systemd-extras-0.10-1-any.pkg.tar.xz" >> build.conf
          fi
          ./scripts/package.sh

      - name: Build Arch Linux image
        run: ./dist/bin/rpi5-archlinux-image build

      - name: Validate boot partition
        run: |
          test -f dist/images/archlinux-rpi5-aarch64.img
          tmp_boot="$(mktemp -d)"
          trap 'rm -rf "$tmp_boot"' EXIT
          for path in kernel8.img initramfs-linux.img bcm2712-rpi-5-b.dtb config.txt cmdline.txt; do
            mcopy -i dist/images/archlinux-rpi5-aarch64.img@@1048576 "::/$path" "$tmp_boot/$path"
            test -s "$tmp_boot/$path"
          done

      - name: Validate cmdline UUID
        run: |
          tmp_boot="$(mktemp -d)"
          trap 'rm -rf "$tmp_boot"' EXIT
          mcopy -i dist/images/archlinux-rpi5-aarch64.img@@1048576 "::/cmdline.txt" "$tmp_boot/cmdline.txt"
          echo "cmdline.txt:"
          cat "$tmp_boot/cmdline.txt"
          if grep -q '__ROOT_UUID__' "$tmp_boot/cmdline.txt"; then
            echo "ERROR: unresolved __ROOT_UUID__ placeholder"
            exit 1
          fi
          if grep -qP 'root=UUID=[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' "$tmp_boot/cmdline.txt"; then
            echo "OK: UUID substitution verified"
          elif grep -qP 'rd\.luks\.name=[0-9a-f-]+=cryptroot' "$tmp_boot/cmdline.txt"; then
            echo "OK: LUKS encryption enabled, rd.luks.name found"
          else
            echo "ERROR: no valid root=UUID= or rd.luks.name in cmdline.txt"
            exit 1
          fi

      - name: Validate config.txt
        run: |
          tmp_boot="$(mktemp -d)"
          trap 'rm -rf "$tmp_boot"' EXIT
          mcopy -i dist/images/archlinux-rpi5-aarch64.img@@1048576 "::/config.txt" "$tmp_boot/config.txt"
          if grep -q 'device_tree_address' "$tmp_boot/config.txt"; then
            echo "ERROR: invalid device_tree_address in config.txt"
            exit 1
          fi
          echo "OK: config.txt validated"

      - name: Validate LUKS (encrypted builds only)
        if: github.ref == 'refs/heads/btrbk-luks-fstrim'
        run: |
          LOOP="$(sudo losetup -fP --show dist/images/archlinux-rpi5-aarch64.img)"
          sudo cryptsetup isLuks "${LOOP}p2" && echo "LUKS: OK" || { echo "LUKS: FAIL"; exit 1; }
          sudo losetup -d "$LOOP"

      - name: Compress image
        run: |
          xz -9 -T0 dist/images/archlinux-rpi5-aarch64.img || { ec=$?; if [ $ec -eq 2 ]; then echo "xz warning ignored (group ownership)"; else exit $ec; fi; }
          test -f dist/images/archlinux-rpi5-aarch64.img.xz

      - name: Upload compressed image
        uses: actions/upload-artifact@v4
        with:
          name: archlinux-rpi5-aarch64
          path: dist/images/archlinux-rpi5-aarch64.img.xz
