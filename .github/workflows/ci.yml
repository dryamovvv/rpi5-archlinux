name: CI

on:
  push:
  pull_request:

jobs:
  shell-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            arch-install-scripts \
            dosfstools \
            e2fsprogs \
            pacman-package-manager \
            parted \
            psmisc \
            systemd \
            udev \
            util-linux

      - name: Validate shell syntax
        run: bash -n scripts/*.sh lib/*.sh lib/core/*.sh lib/modules/*.sh tests/*.sh

      - name: Run ShellCheck
        run: shellcheck -x scripts/*.sh lib/*.sh lib/core/*.sh lib/modules/*.sh tests/*.sh

      - name: Validate workflow YAML
        run: |
          python3 - <<'PY'
          import pathlib
          import yaml

          for path in pathlib.Path(".github/workflows").glob("*.yml"):
              with path.open("r", encoding="utf-8") as fh:
                  yaml.safe_load(fh)
          PY

      - name: Run smoke tests
        run: |
          bash tests/structure_smoke.sh
          bash tests/workflows_smoke.sh
          bash tests/disk_partition_refresh_test.sh
          bash tests/disk_cleanup_test.sh
          bash tests/steps_registry_test.sh
          bash tests/boot_validation_test.sh
          bash tests/config_validation_test.sh
          bash tests/cli_test.sh
          ./scripts/main.sh validate
