name: Release Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            arch-install-scripts \
            aria2 \
            dosfstools \
            e2fsprogs \
            pacman-package-manager \
            parted \
            psmisc \
            systemd \
            udev \
            util-linux \
            mtools \
            xz-utils

      - name: Package builder
        run: |
          cp build.conf.example build.conf
          ./scripts/package.sh

      - name: Build Arch Linux image
        run: ./dist/bin/rpi5-archlinux-image build

      - name: Validate boot partition
        run: |
          test -f dist/images/archlinux-rpi5-aarch64.img
          tmp_boot="$(mktemp -d)"
          trap 'rm -rf "$tmp_boot"' EXIT
          for path in kernel8.img initramfs-linux.img bcm2712-rpi-5-b.dtb config.txt cmdline.txt; do
            mcopy -i dist/images/archlinux-rpi5-aarch64.img@@1048576 "::/$path" "$tmp_boot/$path"
            test -s "$tmp_boot/$path"
          done

      - name: Verify artifacts
        run: |
          image_name="archlinux-rpi5-aarch64.img.xz"
          checksum_name="${image_name}.sha256"
          test -f dist/images/archlinux-rpi5-aarch64.img
          xz -T0 -9 -c dist/images/archlinux-rpi5-aarch64.img > "dist/images/${image_name}"
          test -f "dist/images/${image_name}"
          sha256sum "dist/images/${image_name}" > "dist/images/${checksum_name}"

      - name: Update os_list.json
        run: |
          img_raw="dist/images/archlinux-rpi5-aarch64.img"
          img_xz="dist/images/archlinux-rpi5-aarch64.img.xz"

          extract_size=$(stat -c%s "$img_raw")
          extract_sha256=$(sha256sum "$img_raw" | cut -d' ' -f1)
          download_size=$(stat -c%s "$img_xz")
          download_sha256=$(sha256sum "$img_xz" | cut -d' ' -f1)

          sed -i "s/__EXTRACT_SHA256__/$extract_sha256/" os_list.json
          sed -i "s/__DOWNLOAD_SHA256__/$download_sha256/" os_list.json
          sed -i "s/\"extract_size\": 4294967296/\"extract_size\": $extract_size/" os_list.json
          sed -i "s/\"image_download_size\": 500000000/\"image_download_size\": $download_size/" os_list.json
          sed -i "s/\"release_date\": \"2026-05-26\"/\"release_date\": \"$(date +%Y-%m-%d)\"/" os_list.json

          echo "os_list.json updated:"
          cat os_list.json

          # Append os_list.json to release assets (shared via temp file)
          echo 'os_list.json' >> /tmp/release_assets.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          image_name="archlinux-rpi5-aarch64.img.xz"
          checksum_name="${image_name}.sha256"
          release_assets=(
            "dist/images/${image_name}"
            "dist/images/${checksum_name}"
          )
          # Append any additional assets from previous step
          if [[ -f /tmp/release_assets.txt ]]; then
            while IFS= read -r asset; do
              [[ -n "$asset" ]] && release_assets+=("$asset")
            done < /tmp/release_assets.txt
          fi

          gh release create "$GITHUB_REF_NAME" \
            "${release_assets[@]}" \
            --generate-notes \
            --title "$GITHUB_REF_NAME"
