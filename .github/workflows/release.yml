name: Release Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            arch-install-scripts \
            aria2 \
            dosfstools \
            e2fsprogs \
            pacman-package-manager \
            parted \
            psmisc \
            systemd \
            udev \
            util-linux \
            mtools \
            xz-utils

      - name: Configure release build
        env:
          LUKS_PASSWORD: ${{ secrets.BUILD_LUKS_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.BUILD_TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.BUILD_TELEGRAM_CHAT_ID }}
          ROOT_SSH_KEY: ${{ secrets.BUILD_ROOT_SSH_KEY }}
        run: |
          cp build.conf.example build.conf
          if [[ -n "$ROOT_SSH_KEY" ]]; then
            echo "BUILD_ROOT_SSH_KEY=$ROOT_SSH_KEY" >> build.conf
            echo "BUILD_SSH_PERMIT_ROOT_LOGIN=prohibit-password" >> build.conf
          fi
          if [[ -n "$LUKS_PASSWORD" ]]; then
            echo "BUILD_ENABLE_ENCRYPTION=1" >> build.conf
            echo "BUILD_LUKS_PASSWORD=$LUKS_PASSWORD" >> build.conf
          fi
          if [[ -n "$TG_BOT_TOKEN" ]] && [[ -n "$TG_CHAT_ID" ]]; then
            echo "BUILD_LUKS_UNLOCK_MODE=telegram" >> build.conf
            echo "BUILD_TELEGRAM_BOT_TOKEN=$TG_BOT_TOKEN" >> build.conf
            echo "BUILD_TELEGRAM_CHAT_ID=$TG_CHAT_ID" >> build.conf
          fi

      - name: Package builder
        run: ./scripts/package.sh

      - name: Build Arch Linux image
        run: ./dist/bin/rpi5-archlinux-image build

      - name: Validate boot partition
        run: |
          test -f dist/images/archlinux-rpi5-aarch64.img
          tmp_boot="$(mktemp -d)"
          trap 'rm -rf "$tmp_boot"' EXIT
          for path in kernel8.img initramfs-linux.img bcm2712-rpi-5-b.dtb config.txt cmdline.txt; do
            mcopy -i dist/images/archlinux-rpi5-aarch64.img@@1048576 "::/$path" "$tmp_boot/$path"
            test -s "$tmp_boot/$path"
          done

      - name: Verify artifacts
        run: |
          image_name="archlinux-rpi5-aarch64.img.xz"
          checksum_name="${image_name}.sha256"
          test -f dist/images/archlinux-rpi5-aarch64.img
          xz -T0 -9 -c dist/images/archlinux-rpi5-aarch64.img > "dist/images/${image_name}"
          test -f "dist/images/${image_name}"
          sha256sum "dist/images/${image_name}" > "dist/images/${checksum_name}"

      - name: Update os_list.json and os_list-sublist.json
        run: |
          img_raw="dist/images/archlinux-rpi5-aarch64.img"
          img_xz="dist/images/archlinux-rpi5-aarch64.img.xz"
          release_date="$(date +%Y-%m-%d)"

          extract_size=$(stat -c%s "$img_raw")
          extract_sha256=$(sha256sum "$img_raw" | cut -d' ' -f1)
          download_size=$(stat -c%s "$img_xz")
          download_sha256=$(sha256sum "$img_xz" | cut -d' ' -f1)

          # Main os_list.json (with imager section, for --repo standalone usage)
          sed -i "s/__EXTRACT_SHA256__/$extract_sha256/" os_list.json
          sed -i "s/__DOWNLOAD_SHA256__/$download_sha256/" os_list.json
          sed -i "s/\"extract_size\": 4294967296/\"extract_size\": $extract_size/" os_list.json
          sed -i "s/\"image_download_size\": 500000000/\"image_download_size\": $download_size/" os_list.json
          sed -i "s/__RELEASE_DATE__/$release_date/" os_list.json

          echo "os_list.json updated:"
          cat os_list.json

          # Clean sublist for official RPi Imager OS list (no imager section)
          sed -e "s/__SUBLIST_EXTRACT_SIZE__/$extract_size/" \
              -e "s/__SUBLIST_EXTRACT_SHA256__/$extract_sha256/" \
              -e "s/__SUBLIST_DOWNLOAD_SIZE__/$download_size/" \
              -e "s/__SUBLIST_RELEASE_DATE__/$release_date/" \
              os_list-sublist.json > dist/images/os_list-sublist.json

          echo "os_list-sublist.json generated:"
          cat dist/images/os_list-sublist.json

          echo 'os_list.json' >> /tmp/release_assets.txt
          echo 'dist/images/os_list-sublist.json' >> /tmp/release_assets.txt

      - name: Commit os_list.json back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add os_list.json
          git diff --cached --quiet || git commit -m "os_list.json: update after $GITHUB_REF_NAME release"
          git push origin HEAD:main

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          image_name="archlinux-rpi5-aarch64.img.xz"
          checksum_name="${image_name}.sha256"
          release_assets=(
            "dist/images/${image_name}"
            "dist/images/${checksum_name}"
          )
          # Append any additional assets from previous step
          if [[ -f /tmp/release_assets.txt ]]; then
            while IFS= read -r asset; do
              [[ -n "$asset" ]] && release_assets+=("$asset")
            done < /tmp/release_assets.txt
          fi

          gh release create "$GITHUB_REF_NAME" \
            "${release_assets[@]}" \
            --generate-notes \
            --title "$GITHUB_REF_NAME"
