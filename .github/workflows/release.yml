name: Release Image

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build builder image
        run: docker build -t rpi5-archlinux-builder .

      - name: Build Arch Linux image
        run: |
          docker run --rm --privileged \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            rpi5-archlinux-builder \
            ./scripts/main.sh

      - name: Verify artifacts
        run: |
          test -f arch_root.img
          sha256sum arch_root.img > arch_root.img.sha256

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            arch_root.img \
            arch_root.img.sha256 \
            --generate-notes \
            --title "$GITHUB_REF_NAME"
