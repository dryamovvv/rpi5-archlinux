name: Release Image

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            arch-install-scripts \
            dosfstools \
            e2fsprogs \
            pacman-package-manager \
            parted \
            psmisc \
            systemd \
            udev \
            util-linux \
            mtools \
            xz-utils

      - name: Build Arch Linux image
        run: sudo ./scripts/main.sh

      - name: Validate boot partition
        run: |
          test -f arch_root.img
          tmp_boot="$(mktemp -d)"
          trap 'rm -rf "$tmp_boot"' EXIT
          for path in kernel8.img initramfs-linux.img bcm2712-rpi-5-b.dtb config.txt cmdline.txt; do
            mcopy -i arch_root.img@@1048576 "::/$path" "$tmp_boot/$path"
            test -s "$tmp_boot/$path"
          done

      - name: Verify artifacts
        run: |
          test -f arch_root.img
          xz -T0 -9 -c arch_root.img > arch_root.img.xz
          test -f arch_root.img.xz
          sha256sum arch_root.img.xz > arch_root.img.xz.sha256

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            arch_root.img.xz \
            arch_root.img.xz.sha256 \
            --generate-notes \
            --title "$GITHUB_REF_NAME"
